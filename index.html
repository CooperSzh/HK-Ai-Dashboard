<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogPulse — 全球物流政策情报</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #fdfcf9;
  --surface: #ffffff;
  --text: #1a1816;
  --text-mid: #5c5854;
  --text-light: #9c9590;
  --accent: #d84315;
  --accent-light: #ff6f42;
  --border: #e8e6e3;
  --critical: #b71c1c;
  --warning: #ef6c00;
  --info: #0277bd;
  --success: #2e7d32;
}

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* HEADER - Magazine masthead style */
.masthead {
  border-bottom: 3px solid var(--text);
  background: var(--surface);
  padding: 28px 0 20px;
}

.masthead-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 40px;
}

.logo-lockup {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin-bottom: 12px;
}

.logo {
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--text);
}

.edition {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text-mid);
  letter-spacing: 1px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  background: var(--bg);
}

.tagline {
  font-family: 'Crimson Pro', serif;
  font-size: 16px;
  font-style: italic;
  color: var(--text-mid);
}

.meta-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-mid);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.live-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
}

.pulse-dot {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}

/* STATS DECK - Clean metric cards */
.stats-deck {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 24px;
  position: relative;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--accent);
}

.stat-card.critical::before { background: var(--critical); }
.stat-card.warning::before { background: var(--warning); }
.stat-card.info::before { background: var(--info); }
.stat-card.success::before { background: var(--success); }

.stat-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-mid);
  margin-bottom: 8px;
  font-weight: 600;
}

.stat-value {
  font-family: 'Crimson Pro', serif;
  font-size: 52px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 8px;
}

.stat-value.critical { color: var(--critical); }
.stat-value.warning { color: var(--warning); }
.stat-value.info { color: var(--info); }

.stat-delta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-light);
}

/* MAIN LAYOUT */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 40px 80px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 40px;
  align-items: start;
}

/* SECTION HEADERS */
.section-header {
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--text);
}

.section-title {
  font-family: 'Crimson Pro', serif;
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 4px;
}

.section-subtitle {
  font-size: 14px;
  color: var(--text-mid);
}

/* FILTERS */
.filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}

.filter-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 8px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 500;
}

.filter-btn:hover {
  border-color: var(--text);
  background: var(--bg);
}

.filter-btn.active {
  background: var(--text);
  color: var(--surface);
  border-color: var(--text);
}

/* NEWS ARTICLE CARDS */
.article {
  background: var(--surface);
  border: 1px solid var(--border);
  margin-bottom: 24px;
  padding: 32px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}

.article:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.06);
}

.article.high {
  border-left: 4px solid var(--critical);
  background: linear-gradient(90deg, rgba(183,28,28,0.03) 0%, transparent 100%);
}

.article.medium {
  border-left: 4px solid var(--warning);
  background: linear-gradient(90deg, rgba(239,108,0,0.02) 0%, transparent 100%);
}

.article-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.source-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-weight: 600;
}

.source-badge.china { color: var(--warning); border-color: var(--warning); background: rgba(239,108,0,0.05); }
.source-badge.us { color: var(--critical); border-color: var(--critical); background: rgba(183,28,28,0.05); }
.source-badge.imo { color: var(--info); border-color: var(--info); background: rgba(2,119,189,0.05); }
.source-badge.port { color: var(--success); border-color: var(--success); background: rgba(46,125,50,0.05); }

.article-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-light);
}

.article-title {
  font-family: 'Crimson Pro', serif;
  font-size: 24px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 12px;
  color: var(--text);
}

.article-summary {
  font-size: 15px;
  color: var(--text-mid);
  line-height: 1.7;
  margin-bottom: 16px;
}

.article-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 4px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* SIDEBAR */
.sidebar {
  position: sticky;
  top: 40px;
}

.widget {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 28px;
  margin-bottom: 32px;
}

.widget-header {
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.widget-title {
  font-family: 'Crimson Pro', serif;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 2px;
}

.widget-subtitle {
  font-size: 12px;
  color: var(--text-light);
}

/* ALERTS */
.alert {
  padding: 16px;
  border-left: 3px solid;
  margin-bottom: 12px;
  background: var(--bg);
}

.alert.critical {
  border-color: var(--critical);
  background: rgba(183,28,28,0.04);
}

.alert.warning {
  border-color: var(--warning);
  background: rgba(239,108,0,0.03);
}

.alert-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
  margin-bottom: 6px;
}

.alert-label.critical { color: var(--critical); }
.alert-label.warning { color: var(--warning); }

.alert-text {
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
}

/* REGIONS */
.region-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.region-item {
  padding: 16px;
  border: 1px solid var(--border);
  background: var(--bg);
  transition: all 0.2s;
}

.region-item:hover {
  border-color: var(--accent);
  background: var(--surface);
}

.region-flag {
  font-size: 24px;
  margin-bottom: 8px;
}

.region-name {
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 2px;
}

.region-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-light);
}

.region-bar {
  height: 4px;
  background: var(--border);
  margin-top: 10px;
  overflow: hidden;
}

.region-bar-fill {
  height: 100%;
  background: var(--accent);
  transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* RESPONSIVE */
@media (max-width: 1000px) {
  .grid { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  .stats-deck { grid-template-columns: 1fr 1fr; }
  .masthead-inner { padding: 0 24px; }
  .container { padding: 0 24px 60px; }
}

@media (max-width: 600px) {
  .logo { font-size: 36px; }
  .stats-deck { grid-template-columns: 1fr; }
  .stat-value { font-size: 40px; }
  .article-title { font-size: 20px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const DEMO_DATA = {
  generated_at: "2024-01-15T01:00:00Z",
  stats: { total: 48, high_risk: 6, sources: 12, regions: 38 },
  items: [
    {
      id: 1, category: 'china', priority: 'high',
      source: '中国海关总署', time: '2小时前',
      title: '海关总署发布2024年进出口货物通关便利化新规，压缩通关时间40%',
      summary: '新规要求进口货物平均通关时间降至28小时以内，出口货物降至1.5小时，适用范围覆盖全国所有主要港口。政策预计将显著提升中国港口竞争力。',
      tags: ['通关', '政策', '港口效率'], region: 'asia'
    },
    {
      id: 2, category: 'us', priority: 'high',
      source: '美国贸易代表署', time: '3小时前',
      title: '美方宣布对中国造船业及港口服务征收新一轮附加税，最高达100%',
      summary: '根据新规，中国船厂建造的船舶进入美国港口将缴纳高额费用，预计影响全球50%以上的集装箱运力。航运业对此表示高度关注。',
      tags: ['关税', '贸易战', '航运'], region: 'america'
    },
    {
      id: 3, category: 'imo', priority: 'medium',
      source: 'IMO 国际海事组织', time: '5小时前',
      title: 'IMO批准2024年GHG战略修订案，2050年前实现净零排放目标',
      summary: '新战略要求国际航运业在2030年前将碳排放强度降低40%，2050年前达到净零排放，影响全球9万余艘商船。多国已开始制定配套实施细则。',
      tags: ['减排', 'GHG', '绿色航运'], region: 'global'
    },
    {
      id: 4, category: 'port', priority: 'medium',
      source: '新加坡港务局', time: '6小时前',
      title: '新加坡推出TUAS港口自动化全面升级计划，年处理能力提升至6500万TEU',
      summary: '计划于2026年完成全港自动化改造，配备800台自动导引车，将成为全球最大全自动化港口。项目总投资超过200亿美元。',
      tags: ['自动化', '新加坡', '港口扩建'], region: 'asia'
    },
    {
      id: 5, category: 'us', priority: 'medium',
      source: 'EU 欧盟委员会', time: '8小时前',
      title: '欧盟航运ETS碳交易体系正式纳入跨大西洋航线，每吨CO₂碳价约65欧元',
      summary: '自2024年起，所有进出欧盟港口的船舶须为其50%的排放购买碳配额，远洋航线100%纳入。预计将增加航运公司年度成本约30亿欧元。',
      tags: ['ETS', '欧盟', '碳交易'], region: 'europe'
    },
    {
      id: 6, category: 'china', priority: 'low',
      source: '中国商务部', time: '10小时前',
      title: '商务部：扩大RCEP框架下物流合作，推动跨境电商物流标准统一',
      summary: '将与15个RCEP成员国协调建立统一的跨境物流标准体系，目标于2025年底完成主要规则对接。预计将降低跨境物流成本15-20%。',
      tags: ['RCEP', '跨境电商', '标准化'], region: 'asia'
    },
    {
      id: 7, category: 'port', priority: 'low',
      source: '鹿特丹港务局', time: '12小时前',
      title: '鹿特丹港年吞吐量突破4.7亿吨，创欧洲单一港口历史新高',
      summary: '能源类货物尤其是LNG和氢能源进口量同比增长23%，反映欧洲能源转型加速推进态势。集装箱业务保持稳定增长。',
      tags: ['鹿特丹', '吞吐量', '能源'], region: 'europe'
    },
    {
      id: 8, category: 'imo', priority: 'low',
      source: 'WTO 世界贸易组织', time: '14小时前',
      title: 'WTO预测2024年全球货物贸易量增长2.6%，物流供应链稳定性持续改善',
      summary: '报告显示全球航运运力供需趋于平衡，预计集装箱运价将在2024年下半年趋于稳定。地缘政治风险仍是主要不确定因素。',
      tags: ['WTO', '贸易预测', '运价'], region: 'global'
    }
  ]
};

function App() {
  const [filter, setFilter] = useState('all');
  const [data, setData] = useState(DEMO_DATA);

  const filteredItems = filter === 'all' 
    ? data.items 
    : data.items.filter(item => item.category === filter);

  const alerts = data.items.filter(item => item.priority === 'high' || item.priority === 'medium').slice(0, 4);

  const regions = [
    { id: 'asia', name: '亚太', flag: '🌏', count: 18, max: 40 },
    { id: 'europe', name: '欧洲', flag: '🌍', count: 12, max: 28 },
    { id: 'america', name: '美洲', flag: '🌎', count: 11, max: 20 },
    { id: 'global', name: '全球', flag: '🗺️', count: 7, max: 12 }
  ];

  const getBadgeClass = (cat) => {
    const map = { china: 'china', us: 'us', imo: 'imo', port: 'port' };
    return map[cat] || '';
  };

  return (
    <>
      {/* MASTHEAD */}
      <div className="masthead">
        <div className="masthead-inner">
          <div className="logo-lockup">
            <h1 className="logo">LogPulse</h1>
            <span className="edition">全球版</span>
          </div>
          <p className="tagline">追踪全球物流与贸易政策动态</p>
          <div className="meta-bar">
            <span className="date">{new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
            <div className="live-indicator">
              <div className="pulse-dot"></div>
              实时更新
            </div>
          </div>
        </div>
      </div>

      {/* STATS */}
      <div className="stats-deck">
        <div className="stat-card">
          <div className="stat-label">今日政策动态</div>
          <div className="stat-value">{data.stats.total}</div>
          <div className="stat-delta">↑ 较昨日 +6</div>
        </div>
        <div className="stat-card critical">
          <div className="stat-label">高风险预警</div>
          <div className="stat-value critical">{data.stats.high_risk}</div>
          <div className="stat-delta">⚠ 需重点关注</div>
        </div>
        <div className="stat-card info">
          <div className="stat-label">监测信息源</div>
          <div className="stat-value info">{data.stats.sources}</div>
          <div className="stat-delta">✓ 全部在线</div>
        </div>
        <div className="stat-card success">
          <div className="stat-label">覆盖地区</div>
          <div className="stat-value">{data.stats.regions}</div>
          <div className="stat-delta">— 全球覆盖</div>
        </div>
      </div>

      {/* MAIN */}
      <div className="container">
        <div className="grid">
          {/* LEFT: NEWS */}
          <main>
            <div className="section-header">
              <h2 className="section-title">政策动态</h2>
              <p className="section-subtitle">来自 IMO、WTO、中国海关、美欧及全球主要港口的最新政策</p>
            </div>

            <div className="filters">
              <button 
                className={`filter-btn ${filter === 'all' ? 'active' : ''}`}
                onClick={() => setFilter('all')}
              >
                全部 ({data.items.length})
              </button>
              <button 
                className={`filter-btn ${filter === 'port' ? 'active' : ''}`}
                onClick={() => setFilter('port')}
              >
                港口政策
              </button>
              <button 
                className={`filter-btn ${filter === 'imo' ? 'active' : ''}`}
                onClick={() => setFilter('imo')}
              >
                IMO / WTO
              </button>
              <button 
                className={`filter-btn ${filter === 'china' ? 'active' : ''}`}
                onClick={() => setFilter('china')}
              >
                中国海关
              </button>
              <button 
                className={`filter-btn ${filter === 'us' ? 'active' : ''}`}
                onClick={() => setFilter('us')}
              >
                美欧贸易
              </button>
            </div>

            <div>
              {filteredItems.map(item => (
                <article key={item.id} className={`article ${item.priority}`}>
                  <div className="article-meta">
                    <span className={`source-badge ${getBadgeClass(item.category)}`}>
                      {item.source}
                    </span>
                    <span className="article-time">{item.time}</span>
                  </div>
                  <h3 className="article-title">{item.title}</h3>
                  <p className="article-summary">{item.summary}</p>
                  <div className="article-tags">
                    {item.tags.map(tag => (
                      <span key={tag} className="tag">{tag}</span>
                    ))}
                  </div>
                </article>
              ))}
            </div>
          </main>

          {/* RIGHT: SIDEBAR */}
          <aside className="sidebar">
            {/* ALERTS */}
            <div className="widget">
              <div className="widget-header">
                <h3 className="widget-title">风险预警</h3>
                <p className="widget-subtitle">高/中风险事件</p>
              </div>
              {alerts.map(item => (
                <div key={item.id} className={`alert ${item.priority}`}>
                  <div className={`alert-label ${item.priority}`}>
                    {item.priority === 'high' ? '高风险' : '中风险'} · {item.source}
                  </div>
                  <div className="alert-text">
                    {item.title.substring(0, 50)}...
                  </div>
                </div>
              ))}
            </div>

            {/* REGIONS */}
            <div className="widget">
              <div className="widget-header">
                <h3 className="widget-title">地区分布</h3>
                <p className="widget-subtitle">动态覆盖情况</p>
              </div>
              <div className="region-grid">
                {regions.map(region => (
                  <div key={region.id} className="region-item">
                    <div className="region-flag">{region.flag}</div>
                    <div className="region-name">{region.name}</div>
                    <div className="region-count">{region.count} 条动态</div>
                    <div className="region-bar">
                      <div 
                        className="region-bar-fill"
                        style={{ width: `${(region.count / region.max) * 100}%` }}
                      ></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </aside>
        </div>
      </div>
    </>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
