<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球物流政策情报看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #040d1a;
    --bg2: #071428;
    --surface: #0a1e38;
    --surface2: #0f2a4a;
    --border: #1a3a5c;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #39ff14;
    --warn: #ffd700;
    --danger: #ff3358;
    --text: #e0f0ff;
    --muted: #5a8aaa;
    --grid: rgba(0, 212, 255, 0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(4, 13, 26, 0.9);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    display: flex; align-items: center; gap: 14px;
  }

  .logo-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--bg);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.4); }
    50% { box-shadow: 0 0 20px 6px rgba(0,212,255,0.15); }
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .logo-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }

  .header-right {
    display: flex; align-items: center; gap: 20px;
  }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--accent3);
    padding: 4px 10px;
    border: 1px solid var(--accent3);
    border-radius: 2px;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: var(--accent3);
    border-radius: 50%;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .last-updated {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .stat-item {
    padding: 16px 24px;
    border-right: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
    cursor: default;
  }

  .stat-item:hover { background: var(--surface); }

  .stat-item::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.3s;
  }

  .stat-item:hover::after { transform: scaleX(1); }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1;
  }

  .stat-delta {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    margin-top: 4px;
  }

  .up { color: var(--accent3); }
  .down { color: var(--danger); }
  .neutral { color: var(--warn); }

  /* LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: auto auto;
    gap: 0;
    min-height: calc(100vh - 130px);
  }

  .panel {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }

  .panel-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .panel-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 2px;
  }

  /* NEWS FEED */
  .news-panel { grid-row: 1 / 3; }

  .feed-filters {
    display: flex; gap: 8px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0, 212, 255, 0.05);
  }

  .filter-btn.cat-port.active { border-color: var(--accent); color: var(--accent); }
  .filter-btn.cat-imo.active { border-color: var(--accent2); color: var(--accent2); }
  .filter-btn.cat-china.active { border-color: var(--warn); color: var(--warn); }
  .filter-btn.cat-us.active { border-color: var(--danger); color: var(--danger); }

  .news-list {
    overflow-y: auto;
    max-height: calc(100vh - 280px);
  }

  .news-list::-webkit-scrollbar { width: 4px; }
  .news-list::-webkit-scrollbar-track { background: var(--bg); }
  .news-list::-webkit-scrollbar-thumb { background: var(--border); }

  .news-item {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    display: flex; gap: 14px;
    animation: fadeIn 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .news-item:nth-child(1) { animation-delay: 0.05s; }
  .news-item:nth-child(2) { animation-delay: 0.1s; }
  .news-item:nth-child(3) { animation-delay: 0.15s; }
  .news-item:nth-child(4) { animation-delay: 0.2s; }
  .news-item:nth-child(5) { animation-delay: 0.25s; }
  .news-item:nth-child(6) { animation-delay: 0.3s; }
  .news-item:nth-child(7) { animation-delay: 0.35s; }
  .news-item:nth-child(8) { animation-delay: 0.4s; }

  .news-item:hover { background: var(--surface); }

  .news-item.high::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--danger);
  }

  .news-item.medium::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--warn);
  }

  .news-item.low::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--muted);
  }

  .news-cat-icon {
    width: 32px; height: 32px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .cat-port-bg { background: rgba(0, 212, 255, 0.1); }
  .cat-imo-bg { background: rgba(255, 107, 53, 0.1); }
  .cat-china-bg { background: rgba(255, 215, 0, 0.1); }
  .cat-us-bg { background: rgba(255, 51, 88, 0.1); }

  .news-content { flex: 1; min-width: 0; }

  .news-meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; flex-wrap: wrap;
  }

  .news-source {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 2px;
  }

  .src-port { background: rgba(0,212,255,0.1); color: var(--accent); }
  .src-imo { background: rgba(255,107,53,0.1); color: var(--accent2); }
  .src-china { background: rgba(255,215,0,0.1); color: var(--warn); }
  .src-us { background: rgba(255,51,88,0.1); color: var(--danger); }

  .news-time {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
  }

  .news-title {
    font-size: 13px;
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 6px;
    color: var(--text);
  }

  .news-summary {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .news-tags {
    display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
  }

  .tag {
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    padding: 1px 6px;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 2px;
  }

  /* SIDEBAR */
  .sidebar { grid-column: 2; }

  /* ALERT PANEL */
  .alert-list { padding: 12px 16px; }

  .alert-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 12px;
    margin-bottom: 8px;
    border-radius: 4px;
    border: 1px solid;
    animation: slideIn 0.5s ease forwards;
    opacity: 0;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .alert-item.alert-high {
    background: rgba(255, 51, 88, 0.06);
    border-color: rgba(255, 51, 88, 0.3);
  }

  .alert-item.alert-med {
    background: rgba(255, 215, 0, 0.05);
    border-color: rgba(255, 215, 0, 0.25);
  }

  .alert-icon { font-size: 14px; margin-top: 1px; }

  .alert-text {
    font-size: 11px;
    line-height: 1.5;
    color: var(--text);
  }

  .alert-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    margin-bottom: 3px;
  }

  .lbl-high { color: var(--danger); }
  .lbl-med { color: var(--warn); }

  /* REGION MAP */
  .region-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; padding: 14px 16px;
  }

  .region-card {
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .region-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .region-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .region-card.r-asia::before { background: var(--warn); }
  .region-card.r-europe::before { background: var(--accent); }
  .region-card.r-america::before { background: var(--danger); }
  .region-card.r-mideast::before { background: var(--accent2); }

  .region-flag { font-size: 20px; margin-bottom: 4px; }
  .region-name { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
  .region-count {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .region-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }

  .region-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }

  .r-asia .region-bar-fill { background: var(--warn); }
  .r-europe .region-bar-fill { background: var(--accent); }
  .r-america .region-bar-fill { background: var(--danger); }
  .r-mideast .region-bar-fill { background: var(--accent2); }

  /* TREND CHART */
  .chart-wrap {
    padding: 16px;
  }

  canvas {
    width: 100%; height: 120px;
    border-radius: 4px;
  }

  /* TICKER */
  .ticker {
    overflow: hidden;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 8px 0;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 99;
  }

  .ticker-inner {
    display: flex;
    animation: ticker 40s linear infinite;
    white-space: nowrap;
  }

  @keyframes ticker {
    from { transform: translateX(100vw); }
    to { transform: translateX(-100%); }
  }

  .ticker-item {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 0 40px;
    color: var(--muted);
  }

  .ticker-item span {
    color: var(--accent);
    margin-right: 6px;
  }

  /* LOADING OVERLAY */
  .loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 20px;
    transition: opacity 0.5s;
  }

  .loading.hidden { opacity: 0; pointer-events: none; }

  .load-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 6px;
    color: var(--accent);
  }

  .load-bar {
    width: 240px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .load-bar-fill {
    height: 100%;
    background: var(--accent);
    animation: load 1.6s ease forwards;
  }

  @keyframes load {
    from { width: 0; }
    to { width: 100%; }
  }

  .load-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { grid-column: 1; }
    .stats-bar { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="load-logo">LOGPULSE</div>
  <div class="load-bar"><div class="load-bar-fill"></div></div>
  <div class="load-text">正在加载全球物流情报...</div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <div>
      <div class="logo-text">LOGPULSE</div>
      <div class="logo-sub">全球物流政策情报系统</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE FEED
    </div>
    <div class="last-updated" id="lastUpdated">-- 加载中 --</div>
  </div>
</header>

<!-- Stats Bar -->
<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-label">今日政策动态</div>
    <div class="stat-value" id="statTotal" style="color:var(--accent)">0</div>
    <div class="stat-delta up" id="statDelta">↑ 加载中</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">高风险预警</div>
    <div class="stat-value" id="statHigh" style="color:var(--danger)">0</div>
    <div class="stat-delta" id="statHighDelta">— 稳定</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">监测信息源</div>
    <div class="stat-value" style="color:var(--accent2)">12</div>
    <div class="stat-delta up">↑ 全部在线</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">覆盖地区</div>
    <div class="stat-value" style="color:var(--warn)">38</div>
    <div class="stat-delta neutral">— 全球</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">数据更新</div>
    <div class="stat-value" id="statRefresh" style="color:var(--accent3)">24H</div>
    <div class="stat-delta up">↑ 自动运行</div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- News Feed -->
  <div class="panel news-panel">
    <div class="panel-header">
      <span class="panel-title">// 政策动态实时流</span>
      <span class="panel-badge" id="newsCount">加载中...</span>
    </div>
    <div class="feed-filters">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn cat-port" data-filter="port">🚢 港口政策</button>
      <button class="filter-btn cat-imo" data-filter="imo">🌐 IMO/WTO</button>
      <button class="filter-btn cat-china" data-filter="china">🇨🇳 中国海关</button>
      <button class="filter-btn cat-us" data-filter="us">🇺🇸 美欧贸易</button>
    </div>
    <div class="news-list" id="newsList"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Alerts -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">// 风险预警</span>
        <span class="panel-badge">实时</span>
      </div>
      <div class="alert-list" id="alertList"></div>
    </div>

    <!-- Region -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">// 地区覆盖</span>
        <span class="panel-badge">4 区域</span>
      </div>
      <div class="region-grid" id="regionGrid"></div>
    </div>

    <!-- Trend -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">// 7日动态趋势</span>
        <span class="panel-badge">政策数量</span>
      </div>
      <div class="chart-wrap">
        <canvas id="trendChart"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- Ticker -->
<div class="ticker">
  <div class="ticker-inner" id="ticker"></div>
</div>

<script>
// ===================== DATA LOADER =====================
let allItems = [];
let currentFilter = 'all';

async function loadData() {
  try {
    const res = await fetch('data/news.json');
    const data = await res.json();
    allItems = data.items || [];
    renderDashboard(allItems);
  } catch (e) {
    // Demo data fallback
    allItems = getDemoData();
    renderDashboard(allItems);
  }
}

    {

      tags: ['关税', '贸易战', '航运'],
      time: '3小时前', region: 'america', icon: '🇺🇸', srcClass: 'src-us', catClass: 'cat-us-bg'
    },
    {
      id: 3, category: 'imo', priority: 'medium',
      source: 'IMO 国际海事组织',
      title: 'IMO批准2024年GHG战略修订案，2050年前实现净零排放目标',
      summary: '新战略要求国际航运业在2030年前将碳排放强度降低40%，2050年前达到净零排放，影响全球9万余艘商船。',
      tags: ['减排', 'GHG', '绿色航运'],
      time: '5小时前', region: 'global', icon: '🌐', srcClass: 'src-imo', catClass: 'cat-imo-bg'

    {
      id: 4, category: 'port', priority: 'medium',
      source: '新加坡港务局',
      title: '新加坡推出TUAS港口自动化全面升级计划，年处理能力提升至6500万TEU',
      summary: '计划于2026年完成全港自动化改造，配备800台自动导引车，将成为全球最大全自动化港口。',

      time: '6小时前', region: 'asia', icon: '🚢', srcClass: 'src-port', catClass: 'cat-port-bg'
    },
    {

// ===================== RENDER =====================
function renderDashboard(items) {
  // Stats
  const high = items.filter(i => i.priority === 'high').length;
  animateCount('statTotal', items.length);
  animateCount('statHigh', high);
  document.getElementById('statDelta').textContent = `↑ ${items.length} 条动态`;
  document.getElementById('statHighDelta').className = 'stat-delta ' + (high > 0 ? 'down' : 'up');
  document.getElementById('statHighDelta').textContent = high > 0 ? `⚠ ${high} 条预警` : '✓ 无新预警';
  document.getElementById('newsCount').textContent = `${items.length} 条动态`;
  document.getElementById('lastUpdated').textContent = '更新: ' + new Date().toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});

  renderNews(items);
  renderAlerts(items.filter(i => i.priority === 'high' || i.priority === 'medium'));
  renderRegions(items);
  renderChart();
  renderTicker(items);
}

function animateCount(id, target) {
  const el = document.getElementById(id);
  let n = 0;
  const step = Math.ceil(target / 20);
  const t = setInterval(() => {
    n = Math.min(n + step, target);
    el.textContent = n;
    if (n >= target) clearInterval(t);
  }, 50);
}

function renderNews(items) {
  const list = document.getElementById('newsList');
  const filtered = currentFilter === 'all' ? items : items.filter(i => i.category === currentFilter);
  list.innerHTML = filtered.map(item => `
    <div class="news-item ${item.priority}" onclick="window.open('#','_blank')">
      <div class="news-cat-icon ${item.catClass}">${item.icon}</div>
      <div class="news-content">
        <div class="news-meta">
          <span class="news-source ${item.srcClass}">${item.source}</span>
          <span class="news-time">${item.time}</span>
        </div>
        <div class="news-title">${item.title}</div>
        <div class="news-summary">${item.summary}</div>
        <div class="news-tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

function renderAlerts(items) {
  const list = document.getElementById('alertList');
  const alerts = items.slice(0, 4);
  list.innerHTML = alerts.map((item, i) => `
    <div class="alert-item ${item.priority === 'high' ? 'alert-high' : 'alert-med'}" style="animation-delay:${i*0.1}s">
      <div class="alert-icon">${item.priority === 'high' ? '🔴' : '🟡'}</div>
      <div class="alert-text">
        <div class="alert-label ${item.priority === 'high' ? 'lbl-high' : 'lbl-med'}">${item.priority === 'high' ? '高风险' : '中风险'} · ${item.source}</div>
        ${item.title.substring(0, 42)}...
      </div>
    </div>
  `).join('');
}

function renderRegions(items) {
  const regions = [
    { id: 'asia', name: '亚太地区', flag: '🌏', cls: 'r-asia', max: 40 },
    { id: 'europe', name: '欧洲', flag: '🌍', cls: 'r-europe', max: 28 },
    { id: 'america', name: '美洲', flag: '🌎', cls: 'r-america', max: 20 },
    { id: 'mideast', name: '中东 & 其他', flag: '🗺', cls: 'r-mideast', max: 12 }
  ];
  const grid = document.getElementById('regionGrid');
  grid.innerHTML = regions.map(r => {
    const count = items.filter(i => i.region === r.id).length;
    const pct = Math.round((count / r.max) * 100);
    return `
      <div class="region-card ${r.cls}">
        <div class="region-flag">${r.flag}</div>
        <div class="region-name">${r.name}</div>
        <div class="region-count">${count} 条动态</div>
        <div class="region-bar"><div class="region-bar-fill" style="width:0" data-pct="${pct}"></div></div>
      </div>
    `;
  }).join('');
  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.region-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 100);
}

function renderChart() {
  const canvas = document.getElementById('trendChart');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = 240;
  ctx.scale(2, 2);
  const w = canvas.width / 2, h = canvas.height / 2;

  const data = [8, 12, 7, 15, 11, 18, 14];
  const labels = ['周一','周二','周三','周四','周五','周六','今天'];
  const max = Math.max(...data) + 2;

  ctx.fillStyle = 'rgba(0, 212, 255, 0.03)';
  ctx.fillRect(0, 0, w, h);

  // Grid lines
  for (let i = 0; i <= 4; i++) {
    const y = 10 + (h - 30) * (1 - i / 4);
    ctx.strokeStyle = 'rgba(0,212,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(30, y); ctx.lineTo(w - 10, y); ctx.stroke();
    ctx.fillStyle = 'rgba(90,138,170,0.7)';
    ctx.font = '8px Space Mono, monospace';
    ctx.fillText(Math.round(max * i / 4), 2, y + 3);
  }

  const stepX = (w - 40) / (data.length - 1);

  // Area fill
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = 30 + i * stepX;
    const y = 10 + (h - 30) * (1 - v / max);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(30 + (data.length - 1) * stepX, h - 20);
  ctx.lineTo(30, h - 20);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(0,212,255,0.15)');
  grad.addColorStop(1, 'rgba(0,212,255,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = 30 + i * stepX;
    const y = 10 + (h - 30) * (1 - v / max);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Dots
  data.forEach((v, i) => {
    const x = 30 + i * stepX;
    const y = 10 + (h - 30) * (1 - v / max);
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = i === data.length - 1 ? '#ff6b35' : '#00d4ff';
    ctx.fill();
    ctx.fillStyle = 'rgba(90,138,170,0.8)';
    ctx.font = '8px Space Mono, monospace';
    ctx.fillText(labels[i], x - 10, h - 8);
  });
}

function renderTicker(items) {
  const ticker = document.getElementById('ticker');
  const content = items.map(i => `<span class="ticker-item"><span>${i.source}</span>${i.title.substring(0, 30)}...</span>`).join('');
  ticker.innerHTML = content + content;
}

// ===================== FILTERS =====================
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderNews(allItems);
    document.getElementById('newsCount').textContent =
      (currentFilter === 'all' ? allItems.length : allItems.filter(i => i.category === currentFilter).length) + ' 条动态';
  });
});

window.addEventListener('load', () => {
  loadData();
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 1800);
});

window.addEventListener('resize', renderChart);
