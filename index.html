<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物流情报引擎 — 香港物流政策洞察</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #fdfcf9; --surface: #ffffff; --text: #1a1816; --text-mid: #5c5854; --text-light: #9c9590;
  --accent: #d84315; --accent-light: #ff6f42; --border: #e8e6e3; --critical: #b71c1c; --warning: #ef6c00;
  --info: #0277bd; --success: #2e7d32;
}
body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
.masthead { border-bottom: 3px solid var(--text); background: var(--surface); padding: 28px 0 20px; }
.masthead-inner { max-width: 1400px; margin: 0 auto; padding: 0 40px; }
.logo-lockup { display: flex; align-items: baseline; gap: 20px; margin-bottom: 12px; }
.logo { font-family: 'Crimson Pro', Georgia, serif; font-size: 48px; font-weight: 700; letter-spacing: -1px; }
.edition { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; color: var(--text-mid); letter-spacing: 1px; padding: 4px 10px; border: 1px solid var(--border); background: var(--bg); }
.tagline { font-family: 'Crimson Pro', serif; font-size: 16px; font-style: italic; color: var(--text-mid); }
.meta-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.5px; }
.live-indicator { display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); font-weight: 600; }
.pulse-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }
.stats-deck { max-width: 1400px; margin: 0 auto; padding: 32px 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; position: relative; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); }
.stat-card.critical::before { background: var(--critical); }
.stat-card.info::before { background: var(--info); }
.stat-card.success::before { background: var(--success); }
.stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-mid); margin-bottom: 8px; font-weight: 600; }
.stat-value { font-family: 'Crimson Pro', serif; font-size: 52px; font-weight: 700; line-height: 1; margin-bottom: 8px; }
.stat-value.critical { color: var(--critical); }
.stat-value.info { color: var(--info); }
.stat-delta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-light); }
.container { max-width: 1400px; margin: 0 auto; padding: 0 40px 80px; }
.grid { display: grid; grid-template-columns: 1fr 380px; gap: 40px; align-items: start; }
.section-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--text); }
.section-title { font-family: 'Crimson Pro', serif; font-size: 32px; font-weight: 700; margin-bottom: 4px; }
.section-subtitle { font-size: 14px; color: var(--text-mid); }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
.filter-btn { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); color: var(--text-mid); cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
.filter-btn:hover { border-color: var(--text); background: var(--bg); }
.filter-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }
.article { background: var(--surface); border: 1px solid var(--border); margin-bottom: 24px; padding: 32px; cursor: pointer; transition: all 0.3s; position: relative; }
.article:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
.article.high { border-left: 4px solid var(--critical); background: linear-gradient(90deg, rgba(183,28,28,0.03) 0%, transparent 100%); }
.article.medium { border-left: 4px solid var(--warning); background: linear-gradient(90deg, rgba(239,108,0,0.02) 0%, transparent 100%); }
.article-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.source-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; padding: 4px 10px; background: var(--bg); border: 1px solid var(--border); font-weight: 600; }
.source-badge.china { color: var(--warning); border-color: var(--warning); background: rgba(239,108,0,0.05); }
.source-badge.us { color: var(--critical); border-color: var(--critical); background: rgba(183,28,28,0.05); }
.source-badge.imo { color: var(--info); border-color: var(--info); background: rgba(2,119,189,0.05); }
.source-badge.port { color: var(--success); border-color: var(--success); background: rgba(46,125,50,0.05); }
.article-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-light); }
.article-title { font-family: 'Crimson Pro', serif; font-size: 24px; font-weight: 700; line-height: 1.3; margin-bottom: 12px; }
.article-summary { font-size: 15px; color: var(--text-mid); line-height: 1.7; margin-bottom: 16px; }
.article-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 4px 8px; background: var(--bg); border: 1px solid var(--border); color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar { position: sticky; top: 40px; }
.widget { background: var(--surface); border: 1px solid var(--border); padding: 28px; margin-bottom: 32px; }
.widget-header { margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.widget-title { font-family: 'Crimson Pro', serif; font-size: 20px; font-weight: 700; margin-bottom: 2px; }
.widget-subtitle { font-size: 12px; color: var(--text-light); }
.alert { padding: 16px; border-left: 3px solid; margin-bottom: 12px; background: var(--bg); }
.alert.critical { border-color: var(--critical); background: rgba(183,28,28,0.04); }
.alert.warning { border-color: var(--warning); background: rgba(239,108,0,0.03); }
.alert-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 6px; }
.alert-label.critical { color: var(--critical); }
.alert-label.warning { color: var(--warning); }
.alert-text { font-size: 13px; line-height: 1.5; }
.region-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.region-item { padding: 16px; border: 1px solid var(--border); background: var(--bg); transition: all 0.2s; }
.region-item:hover { border-color: var(--accent); background: var(--surface); }
.region-flag { font-size: 24px; margin-bottom: 8px; }
.region-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
.region-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-light); }
.region-bar { height: 4px; background: var(--border); margin-top: 10px; overflow: hidden; }
.region-bar-fill { height: 100%; background: var(--accent); transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
.loading-screen, .error-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; padding: 40px; text-align: center; }
@media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } .sidebar { position: static; } .stats-deck { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .logo { font-size: 36px; } .stats-deck { grid-template-columns: 1fr; } .stat-value { font-size: 40px; } .article-title { font-size: 20px; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
function App() {
  const [filter, setFilter] = useState('all');
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  useEffect(() => {
    fetch('data/news.json')
      .then(res => res.ok ? res.json() : Promise.reject(`HTTP ${res.status}`))
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.toString()); setLoading(false); });
  }, []);
  if (loading) return <div className="loading-screen"><div style={{fontSize:'48px'}}>⏳</div><div>正在加載數據...</div></div>;
  if (error || !data) return <div className="error-screen"><div style={{fontSize:'48px'}}>⚠️</div><div style={{fontFamily:'Crimson Pro, serif',fontSize:'24px',fontWeight:700}}>數據加載失敗</div><div style={{color:'var(--text-mid)',fontSize:'14px'}}>请确保 data/news.json 存在，运行 python scripts/fetch_rss.py</div><div style={{fontFamily:'JetBrains Mono, monospace',fontSize:'12px',color:'var(--text-light)',background:'var(--bg)',padding:'12px',border:'1px solid var(--border)'}}>错误: {error}</div></div>;
  const filtered = filter === 'all' ? data.items : data.items.filter(i => i.category === filter);
  const alerts = data.items.filter(i => i.priority === 'high' || i.priority === 'medium').slice(0,4);
  const regions = [
    {id:'asia',name:'亞太',flag:'🌏',count:data.stats.by_region.asia||0,max:40},
    {id:'europe',name:'歐洲',flag:'🌍',count:data.stats.by_region.europe||0,max:28},
    {id:'america',name:'美洲',flag:'🌎',count:data.stats.by_region.america||0,max:20},
    {id:'global',name:'全球',flag:'🗺️',count:data.stats.by_region.global||0,max:12}
  ];
  const badge = c => ({china:'china',us:'us',imo:'imo',port:'port'}[c]||'');
  return <>
    <div className="masthead"><div className="masthead-inner">
      <div className="logo-lockup"><h1 className="logo">LogPulse</h1><span className="edition">全球版</span></div>
      <p className="tagline">追蹤全球物流貿易政策動態</p>
      <div className="meta-bar">
        <span className="date">{new Date(data.generated_at).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
        <div className="live-indicator"><div className="pulse-dot"></div>實時更新</div>
      </div>
    </div></div>
    <div className="stats-deck">
      <div className="stat-card"><div className="stat-label">今日政策動態</div><div className="stat-value">{data.stats.total}</div><div className="stat-delta">來自 {data.stats.sources_count} 個信息源</div></div>
      <div className="stat-card critical"><div className="stat-label">高風險預警</div><div className="stat-value critical">{data.stats.high_risk}</div><div className="stat-delta">⚠ 重點關注</div></div>
      <div className="stat-card info"><div className="stat-label">分類統計</div><div className="stat-value info">{data.stats.by_category.port+data.stats.by_category.imo+data.stats.by_category.china+data.stats.by_category.us}</div><div className="stat-delta">港口 {data.stats.by_category.port} · IMO {data.stats.by_category.imo} · 中国 {data.stats.by_category.china} · 美欧 {data.stats.by_category.us}</div></div>
      <div className="stat-card success"><div className="stat-label">地區覆蓋</div><div className="stat-value">{regions.reduce((s,r)=>s+r.count,0)}</div><div className="stat-delta">— 全球覆蓋</div></div>
    </div>
    <div className="container"><div className="grid">
      <main>
        <div className="section-header"><h2 className="section-title">政策動態</h2><p className="section-subtitle">來自 IMO、WTO、中國海關、美歐及全球主要港口動態</p></div>
        <div className="filters">
          <button className={`filter-btn ${filter==='all'?'active':''}`} onClick={()=>setFilter('all')}>全部 ({data.items.length})</button>
          <button className={`filter-btn ${filter==='port'?'active':''}`} onClick={()=>setFilter('port')}>港口政策 ({data.stats.by_category.port})</button>
          <button className={`filter-btn ${filter==='imo'?'active':''}`} onClick={()=>setFilter('imo')}>IMO/WTO ({data.stats.by_category.imo})</button>
          <button className={`filter-btn ${filter==='china'?'active':''}`} onClick={()=>setFilter('china')}>中國海關 ({data.stats.by_category.china})</button>
          <button className={`filter-btn ${filter==='us'?'active':''}`} onClick={()=>setFilter('us')}>美歐貿易 ({data.stats.by_category.us})</button>
        </div>
        <div>{filtered.length===0?<div style={{padding:'40px',textAlign:'center',color:'var(--text-mid)'}}>暫無該類別動態</div>:filtered.map(i=>
          <article key={i.id} className={`article ${i.priority}`} onClick={()=>i.link&&i.link!=='#'&&window.open(i.link,'_blank')}>
            <div className="article-meta"><span className={`source-badge ${badge(i.category)}`}>{i.source}</span><span className="article-time">{i.time}</span></div>
            <h3 className="article-title">{i.title}</h3>
            <p className="article-summary">{i.summary}</p>
            <div className="article-tags">{i.tags?.map(t=><span key={t} className="tag">{t}</span>)}</div>
          </article>
        )}</div>
      </main>
      <aside className="sidebar">
        <div className="widget">
          <div className="widget-header"><h3 className="widget-title">風險預警</h3><p className="widget-subtitle">高/中風險事件</p></div>
          {alerts.length===0?<div style={{color:'var(--text-light)',fontSize:'13px'}}>暫無預警信息</div>:alerts.map(i=>
            <div key={i.id} className={`alert ${i.priority}`}>
              <div className={`alert-label ${i.priority}`}>{i.priority==='high'?'高風險':'中風險'} · {i.source}</div>
              <div className="alert-text">{i.title.substring(0,60)}...</div>
            </div>
          )}
        </div>
        <div className="widget">
          <div className="widget-header"><h3 className="widget-title">地區分佈</h3><p className="widget-subtitle">動態覆蓋情況</p></div>
          <div className="region-grid">{regions.map(r=>
            <div key={r.id} className="region-item">
              <div className="region-flag">{r.flag}</div>
              <div className="region-name">{r.name}</div>
              <div className="region-count">{r.count} 條動態</div>
              <div className="region-bar"><div className="region-bar-fill" style={{width:`${Math.min((r.count/r.max)*100,100)}%`}}></div></div>
            </div>
          )}</div>
        </div>
      </aside>
    </div></div>
  </>;
}
ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
