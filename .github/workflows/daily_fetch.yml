name: 🚢 LogPulse — 每日物流情报抓取

on:
  # 每天 UTC 01:00（北京时间 09:00）自动运行
  schedule:
    - cron: '0 1 * * *'

  # 支持手动触发
  workflow_dispatch:
    inputs:
      debug:
        description: '开启调试日志'
        required: false
        default: 'false'

permissions:
  contents: write   # 允许推送 JSON 数据到仓库
  pages: write      # 允许部署 GitHub Pages
  id-token: write

jobs:
  fetch-and-deploy:
    name: 抓取 RSS 并部署看板
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Python 环境
      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安装依赖
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      # 4. 运行抓取脚本
      - name: 🔍 抓取全球物流政策 RSS
        run: |
          python scripts/fetch_rss.py
        env:
          PYTHONIOENCODING: utf-8

      # 5. 调试输出（可选）
      - name: 📊 查看抓取结果摘要
        if: always()
        run: |
          echo "=== 数据文件大小 ==="
          ls -lh data/news.json || echo "文件不存在"
          echo ""
          echo "=== 抓取统计 ==="
          python -c "
          import json
          with open('data/news.json') as f:
              d = json.load(f)
          s = d['stats']
          print(f'总动态: {s[\"total\"]} 条')
          print(f'高风险: {s[\"high_risk\"]} 条')
          print(f'港口政策: {s[\"by_category\"][\"port\"]} 条')
          print(f'IMO/WTO: {s[\"by_category\"][\"imo\"]} 条')
          print(f'中国: {s[\"by_category\"][\"china\"]} 条')
          print(f'美欧: {s[\"by_category\"][\"us\"]} 条')
          print(f'更新时间: {d[\"generated_at\"]}')
          " || echo "解析失败"

      # 6. 提交数据变更
      - name: 💾 提交 JSON 数据到仓库
        run: |
          git config user.name "LogPulse Bot"
          git config user.email "logpulse-bot@github-actions"
          git add data/news.json
          git diff --staged --quiet || git commit -m "🚢 自动更新: $(date +'%Y-%m-%d %H:%M') UTC 物流情报数据"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. 部署 GitHub Pages
      - name: 🌐 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,scripts,README.md,*.py'
          commit_message: '🚀 自动部署看板: ${{ github.run_number }}'

  notify-on-failure:
    name: 失败通知
    runs-on: ubuntu-latest
    needs: fetch-and-deploy
    if: failure()
    steps:
      - name: ❌ 创建 Issue 记录失败
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 LogPulse 抓取失败 - ${new Date().toISOString().slice(0,10)}`,
              body: `自动抓取任务失败。\n\n**运行链接**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n请检查 RSS 源配置或网络连接。`,
              labels: ['bug', 'automation']
            })
